<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ecb613",
                "background-light": "#f8f8f6",
                "background-dark": "#221d10",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .blur-overlay {
            backdrop-filter: blur(40px);
            background-color: rgba(248, 248, 246, 0.7);
        }
        .diamond-glow {
            filter: drop-shadow(0 0 15px rgba(236, 182, 19, 0.4));
        }
        .progress-shimmer {
            background: linear-gradient(90deg, #ecb613 0%, #f7d983 50%, #ecb613 100%);
            background-size: 200% 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden h-screen w-full flex flex-col items-center justify-between antialiased">
<!-- Background Layer (Blurred Uploaded Image) -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Luxury jewelry piece on a white display" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJBguk0Io61DnnydpHWxbugeStAsEG-LzHcae5eNr-5cjBuoP1JVcQdieWaDB64ChIwJMc_S_91REOJf-i6luBlKZ3BAbj_fEDXCK7172ga_1GmyyjeVo_96G2S_R_RyTlVw8xj6C6DPkVc698RPyKka5YDswdYNRvcJW5jQIDTpkt5IzL2oUSsv42iMMtjLYA4dg9lGXqKw8-lDeuZmPZNruFpBr8N3SJqtvrM3rhjkTk4VSPOg51EP1maztuYXmAgSb_sqZiPl0"/>
<div class="absolute inset-0 blur-overlay dark:bg-background-dark/80"></div>
</div>
<!-- Top Navigation / Status Bar Area -->
<header class="relative z-10 w-full pt-14 pb-4 px-8 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
<span class="material-icons text-white text-sm">auto_awesome</span>
</div>
<span class="text-xs font-semibold tracking-widest text-background-dark/40 dark:text-white/40 uppercase">Precifica.AI</span>
</div>
<div class="text-xs font-medium text-background-dark/60 dark:text-white/60">
            v3.0 Premium
        </div>
</header>
<!-- Main Content: Diamond and Status -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-10 text-center">
<!-- Diamond Container -->
<div class="relative mb-16">
<!-- Glow Effect -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl diamond-glow scale-150"></div>
<!-- Animated Diamond Icon -->
<div class="relative">
<svg class="text-primary opacity-90" fill="none" height="120" viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L3.5 9L12 22L20.5 9L12 2Z" stroke="currentColor" stroke-linejoin="round" stroke-width="0.5"></path>
<path d="M3.5 9H20.5" stroke="currentColor" stroke-linecap="round" stroke-width="0.5"></path>
<path d="M7 9L12 2L17 9" stroke="currentColor" stroke-linecap="round" stroke-width="0.5"></path>
<path d="M7 9L12 22L17 9" stroke="currentColor" stroke-linecap="round" stroke-width="0.5"></path>
<!-- Facet reflections -->
<circle class="animate-pulse" cx="12" cy="11" fill="currentColor" r="0.5"></circle>
<circle class="animate-pulse" cx="9" cy="13" fill="currentColor" r="0.5"></circle>
<circle class="animate-pulse" cx="15" cy="13" fill="currentColor" r="0.5"></circle>
</svg>
</div>
</div>
<!-- Typography -->
<div class="space-y-4">
<h1 class="text-2xl font-light tracking-tight text-background-dark dark:text-white">
                Lapidando sua peça<span class="inline-flex w-8 text-left">...</span>
</h1>
<p class="text-sm text-background-dark/50 dark:text-white/50 max-w-xs mx-auto leading-relaxed">
                Nossa inteligência artificial está realçando cada detalhe e removendo imperfeições para um acabamento de luxo.
            </p>
</div>
</main>
<!-- Bottom Footer: Progress and Stage -->
<footer class="relative z-10 w-full px-8 pb-16 space-y-8">
<!-- Processing Stages -->
<div class="flex justify-between items-center">
<div class="flex flex-col gap-1">
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">Status Atual</span>
<span class="text-xs font-medium text-background-dark dark:text-white">Otimização de Brilho</span>
</div>
<div class="text-right flex flex-col gap-1">
<span class="text-[10px] uppercase tracking-widest text-background-dark/40 dark:text-white/40 font-medium">Concluído</span>
<span class="text-xs font-semibold text-background-dark dark:text-white">64%</span>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full h-[3px] bg-background-dark/5 dark:bg-white/10 rounded-full overflow-hidden">
<div class="h-full w-2/3 progress-shimmer rounded-full"></div>
</div>
<!-- Feedback micro-copy -->
<div class="flex items-center justify-center gap-2 opacity-40">
<span class="material-icons text-[14px]">security</span>
<span class="text-[10px] uppercase tracking-[0.2em] font-medium">Ambiente de processamento seguro</span>
</div>
</footer>
<!-- Glassy Gradient Bottom -->
<div class="fixed bottom-0 left-0 w-full h-48 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent pointer-events-none z-5"></div>
</body></html>
